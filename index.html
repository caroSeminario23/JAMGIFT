<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Regalo Especial</title>
<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
}

.container {
    position: relative;
    width: 200px;
    height: 200px;
    z-index: 10;
    transition: opacity 0.5s ease;
}

.gift {
    position: absolute;
    width: 200px;
    height: 200px;
    background: #ff4d6d;
    border-radius: 15px;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: transform 0.8s ease, opacity 0.8s ease;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.gift::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 40px;
    background: #c9184a;
    top: 80px;
}

.gift::after {
    content: "";
    position: absolute;
    width: 40px;
    height: 100%;
    background: #c9184a;
    left: 80px;
}

.gift.open {
    transform: scale(1.5) rotate(20deg);
    opacity: 0;
}

.card {
    position: absolute;
    bottom: -120px;
    width: 250px;
    padding: 15px;
    background: white;
    border-radius: 10px;
    text-align: center;
    font-size: 16px;
    opacity: 0;
    transition: opacity 0.6s ease;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.card.show {
    opacity: 1;
}

.final-message {
    position: absolute;
    top: 20%;
    left: 0;
    right: 0;
    font-size: 28px;
    font-weight: bold;
    color: white;
    text-align: center;
    opacity: 0;
    transition: opacity 1s ease, top 1s ease;
    z-index: 10;
}

.final-message.show {
    opacity: 1;
    top: 50%;
    transform: translateY(-50%);
}

.heart {
    position: absolute;
    font-size: 20px;
    animation: explode 1.5s ease-out forwards;
}

@keyframes explode {
    0% {
        transform: translate(0,0) scale(1);
        opacity: 1;
    }
    100% {
        transform: translate(var(--x), var(--y)) scale(1.5);
        opacity: 0;
    }
}

.container.hide {
    opacity: 0;
    pointer-events: none;
}

.star {
    position: absolute;
    background: white;
    border-radius: 50%;
    opacity: 0;
    animation: twinkle 2s infinite ease-in-out;
    z-index: 1;
}

@keyframes twinkle {
    0%, 100% { opacity: 0; }
    50% { opacity: 1; }
}

.background-slideshow {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
}

.bg-image {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 90%;
    height: 90%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 1s ease-in-out;
}

.bg-image.active {
    opacity: 0.2;
}
</style>
</head>
<body>

<audio id="bgMusic" loop autoplay>
    <source src="Naruto_opening6.mp3" type="audio/mpeg">
</audio>

<div class="final-message" id="finalMessage">
    🎉 ¡Feliz cumpleaños, mi espe cute! 🎉
</div>

<div class="background-slideshow" id="bgSlideshow"></div>

<div class="container">
    <div class="gift" id="gift"></div>
    <div class="card" id="card"></div>
</div>

<script>
const messages = [
    "Gracias por ser ese rayo de luz que alegra mi vida",
    "Confía en ti mismo, haz crecido. Estate orgulloso",
    "Dulzura+travesura = Jamil",
    "Besitos y abrazos a la distancia, mi espe cute"
];

let currentLayer = 0;
const gift = document.getElementById("gift");
const card = document.getElementById("card");
const finalMessage = document.getElementById("finalMessage");
const audio = document.getElementById("bgMusic");
const container = document.querySelector('.container');
const bgSlideshow = document.getElementById("bgSlideshow");

// Lista de imágenes para el fondo (puedes cambiar las URLs por tus propias fotos)
const images = [
    "images/imagen1.jpg",
    "images/imagen2.jpg",
    "images/imagen3.jpg",
    "images/imagen4.jpg",
    "images/imagen5.jpg",
    "images/imagen6.jpg",
    "images/imagen7.jpg",
    "images/imagen8.jpg",
    "images/imagen9.jpg",
    "images/imagen10.jpg"
];

images.forEach((src, index) => {
    const img = document.createElement("img");
    img.src = src;
    img.classList.add("bg-image");
    if (index === 0) img.classList.add("active");
    bgSlideshow.appendChild(img);
});

let currentImageIndex = 0;
setInterval(() => {
    const imgs = document.querySelectorAll(".bg-image");
    imgs[currentImageIndex].classList.remove("active");
    currentImageIndex = (currentImageIndex + 1) % imgs.length;
    imgs[currentImageIndex].classList.add("active");
}, 3000); // Cambia de imagen cada 3 segundos

createStars();

gift.addEventListener("click", () => {
    if (audio.paused) {
        audio.play();
    }

    if (currentLayer < 4) {
        gift.classList.add("open");
        card.textContent = messages[currentLayer];
        card.classList.add("show");

        setTimeout(() => {
            gift.classList.remove("open");
            gift.style.background = getRandomColor();
            card.classList.remove("show");
        }, 1500);

        currentLayer++;

        if (currentLayer === 4) {
            setTimeout(showFinal, 3000);
        }
    }
});

function getRandomColor() {
    const colors = ["#ff4d6d", "#9d4edd", "#4cc9f0", "#ff8500"];
    return colors[Math.floor(Math.random() * colors.length)];
}

function showFinal() {
    container.classList.add('hide');
    finalMessage.classList.add("show");
    launchHearts();
}

function launchHearts() {
    for (let i = 0; i < 50; i++) {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.textContent = "❤️";
        heart.style.left = "50%";
        heart.style.top = "50%";

        const x = (Math.random() - 0.5) * 600 + "px";
        const y = (Math.random() - 0.5) * 600 + "px";
        heart.style.setProperty('--x', x);
        heart.style.setProperty('--y', y);

        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 1500);
    }
}

function createStars() {
    for (let i = 0; i < 50; i++) {
        const star = document.createElement("div");
        star.classList.add("star");
        star.style.left = Math.random() * 100 + "vw";
        star.style.top = Math.random() * 100 + "vh";
        star.style.width = Math.random() * 3 + 4 + "px";
        star.style.height = star.style.width;
        star.style.animationDelay = Math.random() * 2 + "s";
        document.body.appendChild(star);
    }
}
</script>

</body>
</html>
